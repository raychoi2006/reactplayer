# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [10.x, 12.x]

    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}
    - run: git config --global user.email "raychoi2006@gmail.com"
    - run: git config --global user.name "raychoi2006"
    - run: git remote set-url origin https://6e54121456d97d4a1cc05511e49246928c7c9d31@github.com/raychoi2006/reactplayer.git
    - run: yarn add deepmerge
      
    - run: npm install
    - run: yarn run deploy

